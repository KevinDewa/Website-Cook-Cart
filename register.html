<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Akun - Cook&Cart</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Palet Warna */
      --brand-dark: #005031;
      /* Hijau Tua Logo & Tombol */
      --brand-dark-hover: #003d25;
      --text-dark: #1F2937;
      --text-gray: #6B7280;
      --text-light: #9CA3AF;
      --border-color: #E5E7EB;
      --bg-form-side: #FAFAFA;
      --white: #FFFFFF;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      display: flex;
      min-height: 100vh;
      background-color: var(--bg-form-side);
    }

    /* ============================
           Sisi Kiri: Gambar & Glassmorphism
           ============================ */
    .split-left {
      flex: 1;
      position: relative;
      background-image: url('../img/register/bacground.svg');
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    /* Efek overlay agar gambar tidak terlalu terang */
    .split-left::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.1);
    }

    .glass-card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(12px);
      /* Efek kaca buram */
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
    }

    .glass-card h1 {
      color: var(--brand-dark);
      font-size: 40px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 16px;
    }

    .glass-card p {
      color: #2b3b33;
      font-size: 16px;
      line-height: 1.6;
      font-weight: 500;
    }

    /* ============================
           Sisi Kanan: Formulir Pendaftaran
           ============================ */
    .split-right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background-color: var(--bg-form-side);
    }

    .form-container {
      background-color: var(--white);
      width: 100%;
      max-width: 480px;
      padding: 48px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
    }

    .form-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .form-header h2 {
      font-size: 28px;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 8px;
    }

    .form-header p {
      color: var(--text-gray);
      font-size: 14px;
    }

    /* Input Styles */
    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper svg.left-icon {
      position: absolute;
      left: 16px;
      width: 20px;
      height: 20px;
      color: var(--text-light);
      pointer-events: none;
    }

    .input-wrapper input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text-dark);
      outline: none;
      transition: all 0.2s ease;
    }

    .input-wrapper input::placeholder {
      color: var(--text-light);
    }

    .input-wrapper input:focus {
      border-color: var(--brand-dark);
      box-shadow: 0 0 0 3px rgba(0, 80, 49, 0.1);
    }

    /* Button Style */
    .btn-submit {
      width: 100%;
      padding: 14px;
      background-color: var(--brand-dark);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background-color 0.2s ease;
    }

    .btn-submit:hover {
      background-color: var(--brand-dark-hover);
    }

    .btn-submit svg {
      width: 18px;
      height: 18px;
    }

    /* Footer Form */
    .form-footer {
      margin-top: 32px;
      text-align: center;
      font-size: 14px;
      color: var(--text-gray);
    }

    .form-footer a {
      color: var(--brand-dark);
      font-weight: 700;
      text-decoration: none;
    }

    .form-footer a:hover {
      text-decoration: underline;
    }

    /* ============================
           Responsif untuk Tablet & Mobile
           ============================ */
    @media (max-width: 992px) {
      body {
        flex-direction: column;
        /* Tumpuk atas-bawah di layar kecil */
      }

      .split-left {
        min-height: 400px;
        flex: none;
      }

      .glass-card {
        padding: 32px;
      }
    }

    @media (max-width: 576px) {
      .split-right {
        padding: 24px 16px;
      }

      .form-container {
        padding: 32px 24px;
        border-radius: 16px;
      }
    }
  </style>
</head>

<body>

  <div class="split-left">
    <div class="glass-card">
      <h1>Cook&Cart</h1>
      <p>"Masak Lebih Mudah dan Elegan"<br><br>Perpaduan desain modern dan fungsi yang praktis.</p>
    </div>
  </div>

  <div class="split-right">
    <div class="form-container">

      <div class="form-header">
        <h2>Daftar Akun</h2>
        <p>Mulai perjalanan efisiensi kuliner Anda.</p>
      </div>

      <form action="#" method="POST">

        <div class="input-group">
          <label for="fullname">Nama Lengkap</label>
          <div class="input-wrapper">
            <svg class="left-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
            <input type="text" id="fullname" placeholder="Masukkan nama lengkap Anda" required>
          </div>
        </div>

        <div class="input-group">
          <label for="email">Email</label>
          <div class="input-wrapper">
            <svg class="left-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
            <input type="email" id="email" placeholder="nama@email.com" required>
          </div>
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <svg class="left-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
            <input type="password" id="password" placeholder="Minimal 8 karakter" required>
          </div>
        </div>

        <div class="input-group">
          <label for="confirm_password">Konfirmasi Password</label>
          <div class="input-wrapper">
            <svg class="left-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
            <input type="password" id="confirm_password" placeholder="Ulangi password Anda" required>
          </div>
        </div>

        <a href="login.html" class="btn-submit">
          Daftar
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
          </svg>
        </a>

      </form>

      <div class="form-footer">
        Sudah punya akun? <a href="login.html">Masuk</a>
      </div>

    </div>
  </div>

</body>

</html>
