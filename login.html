<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk - Cook&Cart</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Palet Warna sesuai desain */
      --brand-dark: #0FA958;
      --brand-primary: #12B76A;
      --brand-primary-hover: #0EA75F;
      --text-dark: #1F2937;
      --text-gray: #6B7280;
      --text-light: #9CA3AF;
      --border-color: #E5E7EB;
      --bg-body: #FAFAFA;
      --white: #FFFFFF;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background-color: var(--bg-body);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      /* Perbaikan Scroll */
      padding: 40px 20px;
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
    }

    /* Efek Glow Gradasi di Background (Fixed agar tidak rusak saat scroll) */
    .bg-glow-top-left {
      position: fixed;
      top: -15%;
      left: -10%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(18, 183, 106, 0.12) 0%, rgba(250, 250, 250, 0) 65%);
      z-index: -1;
      pointer-events: none;
    }

    .bg-glow-bottom-right {
      position: fixed;
      bottom: -15%;
      right: -10%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(255, 138, 0, 0.08) 0%, rgba(250, 250, 250, 0) 65%);
      z-index: -1;
      pointer-events: none;
    }

    /* Header Logo */
    .login-header {
      text-align: center;
      margin-bottom: 32px;
      z-index: 1;
    }

    .login-header h1 {
      color: var(--brand-dark);
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .login-header p {
      color: var(--text-gray);
      font-size: 14px;
      font-weight: 500;
    }

    /* Card Form */
    .login-card {
      background-color: var(--white);
      width: 100%;
      max-width: 440px;
      padding: 48px;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
      z-index: 1;
    }

    .login-card h2 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-dark);
    }

    .login-card p.subtitle {
      color: var(--text-gray);
      font-size: 14px;
      margin-bottom: 32px;
    }

    /* Input Group */
    .input-group {
      margin-bottom: 20px;
    }

    .input-label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 8px;
    }

    .input-label-row label {
      margin-bottom: 0;
    }

    .forgot-link {
      font-size: 13px;
      font-weight: 600;
      color: var(--brand-dark);
      text-decoration: none;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    /* Input Field dengan Ikon */
    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper svg.left-icon {
      position: absolute;
      left: 16px;
      width: 20px;
      height: 20px;
      color: var(--text-light);
      pointer-events: none;
    }

    .input-wrapper input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text-dark);
      outline: none;
      transition: all 0.2s ease;
    }

    .input-wrapper input::placeholder {
      color: var(--text-light);
    }

    .input-wrapper input:focus {
      border-color: var(--brand-primary);
      box-shadow: 0 0 0 3px rgba(18, 183, 106, 0.1);
    }

    .input-wrapper button.right-icon {
      position: absolute;
      right: 16px;
      background: none;
      border: none;
      color: var(--text-light);
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
    }

    .input-wrapper button.right-icon:hover {
      color: var(--text-gray);
    }

    /* Tombol Utama */
    .btn-primary {
      width: 100%;
      padding: 14px;
      background-color: var(--brand-primary);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background-color 0.2s ease;
    }

    .btn-primary:hover {
      background-color: var(--brand-primary-hover);
    }

    /* Garis Pembatas (Divider) */
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 24px 0;
      color: var(--text-light);
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border-color);
    }

    .divider span {
      padding: 0 12px;
    }

    /* Tombol Google */
    .btn-google {
      width: 100%;
      padding: 12px;
      background-color: var(--white);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-dark);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background-color 0.2s ease;
    }

    .btn-google:hover {
      background-color: #F9FAFB;
    }

    /* Footer Teks */
    .login-footer {
      margin-top: 32px;
      text-align: center;
      font-size: 14px;
      color: var(--text-gray);
    }

    .login-footer a {
      color: var(--brand-dark);
      font-weight: 600;
      text-decoration: none;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }

    /* Responsif untuk Layar Kecil / Mobile */
    @media (max-width: 500px) {
      body {
        padding: 24px 16px;
      }

      .login-card {
        padding: 32px 24px;
        border-radius: 16px;
      }
    }
  </style>
</head>

<body>

  <div class="bg-glow-top-left"></div>
  <div class="bg-glow-bottom-right"></div>

  <div class="login-header">
    <h1>Cook&Cart</h1>
    <p>Asisten Koki yang Canggih</p>
  </div>

  <div class="login-card">
    <h2>Selamat Datang</h2>
    <p class="subtitle">Masuk untuk melanjutkan ke dapur Anda.</p>

    <form action="#" method="POST">
      <div class="input-group">
        <label for="email">Email</label>
        <div class="input-wrapper">
          <svg class="left-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
          </svg>
          <input type="email" id="email" placeholder="nama@email.com" required>
        </div>
      </div>

      <div class="input-group">
        <div class="input-label-row">
          <label for="password">Password</label>
          <a href="#" class="forgot-link">Lupa password?</a>
        </div>
        <div class="input-wrapper">
          <svg class="left-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>
          <input type="password" id="password" placeholder="••••••••" required>
          <button type="button" class="right-icon" aria-label="Toggle password visibility">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
            </svg>
          </button>
        </div>
      </div>
      <a href="JelajahResep.html">
        <button type="button" class="btn-primary">Masuk</button>
      </a>
    </form>

    <div class="divider">
      <span>atau</span>
    </div>

    <button type="button" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M17.64 9.20455C17.64 8.56636 17.5827 7.95273 17.4764 7.36364H9V10.845H13.8436C13.635 11.97 13.0009 12.9232 12.0477 13.5614V15.8195H14.9564C16.6582 14.2527 17.64 11.9455 17.64 9.20455Z"
          fill="#4285F4" />
        <path
          d="M9 18C11.43 18 13.4673 17.1941 14.9564 15.8195L12.0477 13.5614C11.2418 14.1014 10.2109 14.4205 9 14.4205C6.65591 14.4205 4.67182 12.8373 3.96409 10.71H0.957275V13.0418C2.43818 15.9832 5.48182 18 9 18Z"
          fill="#34A853" />
        <path
          d="M3.96409 10.71C3.78409 10.17 3.68182 9.59318 3.68182 9C3.68182 8.40682 3.78409 7.83 3.96409 7.29V4.95818H0.957275C0.347727 6.17318 0 7.54773 0 9C0 10.4523 0.347727 11.8268 0.957275 13.0418L3.96409 10.71Z"
          fill="#FBBC05" />
        <path
          d="M9 3.57955C10.3214 3.57955 11.5077 4.03364 12.4405 4.92545L15.0218 2.34409C13.4632 0.891818 11.4259 0 9 0C5.48182 0 2.43818 2.01682 0.957275 4.95818L3.96409 7.29C4.67182 5.16273 6.65591 3.57955 9 3.57955Z"
          fill="#EA4335" />
      </svg>
      Lanjutkan dengan Google
    </button>

    <div class="login-footer">
      Belum punya akun? <a href="register.html">Daftar sekarang</a>
    </div>
  </div>

</body>

</html>
